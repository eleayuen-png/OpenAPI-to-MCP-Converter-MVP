# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ['main']

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets the GITHUB_TOKEN permissions to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  # Single deploy job since we're just building and deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build
        run: npm run build
        env:
          VITE_ADMIN_EMAILS: yuenelea@gmail.com
          VITE_STRIPE_PAYMENT_LINK_MONTHLY: https://buy.stripe.com/6oU00jbfRcjV2Vk97Sew800
          VITE_STRIPE_PAYMENT_LINK_QUARTERLY: https://buy.stripe.com/6oU7sLgAbes33Zock4ew803
          VITE_STRIPE_PAYMENT_LINK_SEMIANNUAL: https://buy.stripe.com/9B68wP2Jl97J7bAgAkew804
          VITE_STRIPE_PAYMENT_LINK_ANNUAL: https://buy.stripe.com/aFadR983Fes3fI683Oew806
        
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload dist folder where Vite outputs the build
          path: './dist'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4